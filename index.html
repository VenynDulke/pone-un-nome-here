        function initLazyLoad(){

            if(!('IntersectionObserver' in window)){imgs.forEach(i=>{i.src=i.getAttribute('data-src');i.classList.remove('opacity-0');});return;}
            const obs=new IntersectionObserver((e,o)=>{e.forEach(en=>{if(en.isIntersecting){const i=en.target;i.src=i.getAttribute('data-src');i.onload=()=>{i.classList.remove('opacity-0');i.classList.add('opacity-100');};o.unobserve(i);}});},{rootMargin:"200px 0px",threshold:0.01});
            imgs.forEach(i=>obs.observe(i));

        function openLightbox(k,o){

            setTimeout(()=>l.classList.remove('opacity-0'),10);
        }
